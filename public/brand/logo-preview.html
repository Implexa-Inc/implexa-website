<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Implexa Logo System</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0a0805;
        --surface: #15110c;
        --surface-2: #1c1812;
        --divider: #2a241e;
        --fg: #f5f0e8;
        --muted: #a19992;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--fg);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(1120px, calc(100vw - 48px));
        margin: 0 auto;
        padding: 48px 0;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
        letter-spacing: 0;
      }

      p {
        margin: 0 0 32px;
        color: var(--muted);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 16px;
      }

      .tile {
        min-height: 220px;
        border: 1px solid var(--divider);
        border-radius: 8px;
        background: var(--surface);
        padding: 20px;
        display: grid;
        align-content: center;
        gap: 16px;
      }

      .tile.light {
        background: #fafaf8;
        color: #0a0805;
      }

      .tile.checker {
        background-image:
          linear-gradient(45deg, #ece7dd 25%, transparent 25%),
          linear-gradient(-45deg, #ece7dd 25%, transparent 25%),
          linear-gradient(45deg, transparent 75%, #ece7dd 75%),
          linear-gradient(-45deg, transparent 75%, #ece7dd 75%);
        background-color: #fafaf8;
        background-position: 0 0, 0 10px, 10px -10px, -10px 0;
        background-size: 20px 20px;
      }

      .label {
        color: var(--muted);
        font-size: 13px;
      }

      .light .label,
      .checker .label {
        color: #635c55;
      }

      img {
        display: block;
        max-width: 100%;
        max-height: 154px;
        object-fit: contain;
      }

      .mark {
        width: 128px;
        height: 128px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Implexa Logo System</h1>
      <p>Generated variants for implexa.ai using the existing warm dark, emerald signal, and flame action tokens.</p>
      <section class="grid" aria-label="Logo variants">
        <div class="tile">
          <img src="./implexa-wordmark-dark.svg" alt="Implexa wordmark for dark backgrounds" />
          <div class="label">implexa-wordmark-dark.svg</div>
        </div>
        <div class="tile light">
          <img src="./implexa-wordmark-light.svg" alt="Implexa wordmark for light backgrounds" />
          <div class="label">implexa-wordmark-light.svg</div>
        </div>
        <div class="tile">
          <img class="mark" src="./implexa-mark.svg" alt="Implexa app mark" />
          <div class="label">implexa-mark.svg</div>
        </div>
        <div class="tile">
          <img src="./implexa-lockup-dark.svg" alt="Implexa lockup for dark backgrounds" />
          <div class="label">implexa-lockup-dark.svg</div>
        </div>
        <div class="tile light">
          <img src="./implexa-lockup-light.svg" alt="Implexa lockup for light backgrounds" />
          <div class="label">implexa-lockup-light.svg</div>
        </div>
        <div class="tile checker">
          <img src="./implexa-social-card.svg" alt="Implexa social card" />
          <div class="label">implexa-social-card.svg</div>
        </div>
      </section>
    </main>
  </body>
</html>
